# Release workflow for nanalogue-gui
# Validates version tag and builds on all platforms
# Triggers on GitHub Release or manual dispatch

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-check:
    name: Verify versions match
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check tag matches version
        id: check
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
          TITLE: ${{ github.event.release.name }}
        run: |
          [[ "$TAG" == v* ]] || { echo "Tag '$TAG' must begin with a lowercase 'v' (e.g. v1.2.3)"; exit 1; }
          [[ "$TITLE" != v* && "$TITLE" != V* ]] || { echo "Release title '$TITLE' must not begin with 'v' or 'V' (e.g. 1.2.3)"; exit 1; }
          TAG_V="${TAG#v}"
          V=$(jq -r '.version' package.json)
          [ "$TAG_V" = "$V" ] || { echo "Tag $TAG_V != package.json $V"; exit 1; }
          echo "version=$TAG_V" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: version-check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest

          # Linux glibc builds (via Docker with pypa manylinux containers)
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_docker: true
            container: quay.io/pypa/manylinux_2_28_x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use_docker: true
            container: quay.io/pypa/manylinux_2_28_aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # macOS: direct build
      - name: Setup Node.js
        if: ${{ !matrix.use_docker }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        if: ${{ !matrix.use_docker }}
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Build
        if: ${{ !matrix.use_docker }}
        run: npm run build

      - name: Run tests
        if: ${{ !matrix.use_docker }}
        run: npm test

      # Linux: Docker container build
      - name: Build and test (Linux via Docker)
        if: ${{ matrix.use_docker }}
        env:
          WORKSPACE: ${{ github.workspace }}
          CONTAINER: ${{ matrix.container }}
        run: |
          docker run --rm \
            -v "$WORKSPACE:/workspace" \
            -w /workspace \
            "$CONTAINER" \
            bash -c '
              set -e

              # Install Node.js 22 via NodeSource
              curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
              yum install -y nodejs

              # Print Node.js version for debugging
              echo "Node.js version: $(node --version)"
              echo "npm version: $(npm --version)"

              # Upgrade npm for min-release-age support
              npm install -g npm@11.10.0

              # Install npm dependencies, build, and test
              npm ci --ignore-scripts
              npm rebuild electron esbuild electron-winstaller

              # @pydantic/monty has no native linux-arm64 package;
              # install the WASM fallback so tests pass on aarch64
              npm install --force @pydantic/monty-wasm32-wasi

              npm run build

              npm test
            '

  package:
    name: Package binaries
    needs: [version-check, build]
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.version-check.outputs.version }}
    # Permissions needed so the reusable packaging workflow can upload release assets.
    permissions:
      contents: write # Needed so the reusable packaging workflow can upload release assets.
      actions: write # Needed so the reusable packaging workflow can manage artifacts.
