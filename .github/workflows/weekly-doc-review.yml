name: Weekly Documentation Review

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read # needed to clone the repository contents for the audit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review_docs:
    name: Review docs for issues
    runs-on: ubuntu-latest
    environment: doc-review
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0' # need npm >= 11.10.0 for minimumReleaseAge, so pin a Node release that bundles it

      - name: Review documentation with pi
        id: audit
        continue-on-error: true
        timeout-minutes: 20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
        run: node scripts/doc-audit.js

      - name: Upload pi JSONL log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doc-audit-jsonl-${{ github.run_id }}
          path: /tmp/doc-audit.jsonl
          if-no-files-found: ignore

      - name: Check for documentation changes
        if: steps.audit.outcome == 'success'
        id: changes
        run: |
          set -euo pipefail

          untracked_files="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked_files" ]; then
            printf '%s\n' "Unexpected new files were created by the audit:" "$untracked_files"
            exit 1
          fi

          if [ -n "$(git status --porcelain=v1 --untracked-files=all)" ]; then
            echo "has_changes=true" >>"$GITHUB_OUTPUT"
            git diff --binary --no-ext-diff > /tmp/doc-audit.patch
          else
            echo "has_changes=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Upload documentation patch
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doc-audit-patch-${{ github.run_id }}
          path: /tmp/doc-audit.patch
          if-no-files-found: error

      - name: Fail if audit failed
        if: steps.audit.outcome != 'success'
        run: exit 1

  push_docs:
    name: Push docs changes
    needs: review_docs
    if: needs.review_docs.result == 'success' && needs.review_docs.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to commit and push the generated review branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Download documentation patch
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: doc-audit-patch-${{ github.run_id }}
          path: artifacts

      - name: Apply and push documentation changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          branch="bot/weekly-doc-review-${GITHUB_RUN_ID}"
          patch_file="artifacts/doc-audit.patch"

          git switch -C "$branch"
          git apply --index "$patch_file"

          workflow_files="$(git diff --cached --name-only -- '.github/workflows/')"
          if [ -n "$workflow_files" ]; then
            printf '%s\n' "Refusing to push workflow file changes from the doc audit:" "$workflow_files"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No tracked documentation changes to commit."
            exit 0
          fi

          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Updates documentation via weekly audit"
          git push --set-upstream origin "$branch"
