# CI workflow for nanalogue-gui
# Runs Node.js checks on push/PR to main

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call: # Allow calling from ci-nightly.yml

permissions:
  read-all

jobs:
  check-agents-symlink:
    name: Check AGENTS.md symlink
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify AGENTS.md is a symlink to CLAUDE.md
        run: |
          if [ ! -L AGENTS.md ] || [ "$(readlink AGENTS.md)" != "CLAUDE.md" ]; then
            echo "AGENTS.md must be a symbolic link to CLAUDE.md" >&2
            echo "Fix with: rm AGENTS.md && ln -s CLAUDE.md AGENTS.md" >&2
            exit 1
          fi

  validate-changelog:
    name: Validate CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate CHANGELOG.md
        run: node scripts/validate-changelog.mjs

  validate-css-comments:
    name: Validate CSS comments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate CSS comments
        run: node scripts/validate-css-comments.mjs

  check-md-links:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check markdown links
        run: node scripts/check-md-links.mjs

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Lint (Biome, ESLint, Stylelint, html-validate, empty JSDoc)
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  # Full test matrix for regular PRs and pushes
  test:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node 22 across all platforms (minimum supported version)
          - os: ubuntu-latest
            node: "22"
          - os: ubuntu-24.04-arm
            node: "22"
          - os: macos-latest
            node: "22"
          - os: macos-15-intel
            node: "22"
          # Node 24 version coverage on Linux
          - os: ubuntu-latest
            node: "24"
          - os: ubuntu-24.04-arm
            node: "24"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # Verify that no tracked src/*.ts file exceeds its line-count ceiling.
  # Source files: max 800 lines. Test files: max 1500 lines.
  # Grandfathered files must not grow beyond their individual ceiling.
  check-file-size:
    name: File size check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check file sizes
        run: node scripts/check-file-size.mjs --all

  # Verify that every exported function in *-validation.ts files is named
  # validate* so the naming convention cannot drift silently.
  check-validate-prefix:
    name: validate* prefix check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check validate* prefix
        run: node scripts/check-validate-prefix.mjs --all

  # Verify that %Lines coverage has not regressed for any tracked file
  # and that any brand-new file debuts at 100%.
  check-coverage:
    name: Coverage floor check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check coverage floor
        run: node scripts/check-coverage.mjs

  # Re-execute every code block in each Showboat demo document under
  # demo/showboat-notes/ and confirm the captured output still matches.
  # The documents call node ./dist/execute-cli.mjs, so a full build is required.
  verify-showboat-docs:
    name: Verify Showboat docs
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Verify Showboat documents
        env:
          NODE_OPTIONS: --no-deprecation
        run: |
          for doc in demo/showboat-notes/*.md; do
            echo "=== verifying $doc ==="
            uvx showboat verify "$doc"
          done

  # Minimal test for dependabot PRs (just verify deps work)
  test-dependabot:
    name: Test (Dependabot)
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
