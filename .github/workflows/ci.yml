# CI workflow for nanalogue-gui
# Runs Node.js checks on push/PR to main

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call: # Allow calling from ci-nightly.yml

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-agents-symlink:
    name: Check AGENTS.md symlink
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify AGENTS.md is a symlink to CLAUDE.md
        run: |
          if [ ! -L AGENTS.md ] || [ "$(readlink AGENTS.md)" != "CLAUDE.md" ]; then
            echo "AGENTS.md must be a symbolic link to CLAUDE.md" >&2
            echo "Fix with: rm AGENTS.md && ln -s CLAUDE.md AGENTS.md" >&2
            exit 1
          fi

  validate-changelog:
    name: Validate CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate CHANGELOG.md
        run: node scripts/validate-changelog.mjs

  validate-css-comments:
    name: Validate CSS comments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate CSS comments
        run: node scripts/validate-css-comments.mjs

  check-md-links:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check markdown links
        run: node scripts/check-md-links.mjs

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Verify no non-registry resolved URLs
        run: |
          if grep '"resolved"' package-lock.json | grep -qv 'registry.npmjs.org'; then
            echo "package-lock.json contains non-registry resolved URLs" >&2
            grep '"resolved"' package-lock.json | grep -v 'registry.npmjs.org' >&2
            exit 1
          fi

      - name: Lint (Biome, ESLint, Stylelint, html-validate, empty JSDoc)
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  # Full test matrix for regular PRs and pushes
  test:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    environment: test-with-ai-chat
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node 22 across all platforms (minimum supported version)
          - os: ubuntu-latest
            node: "22"
          - os: ubuntu-24.04-arm
            node: "22"
          - os: macos-latest
            node: "22"
          - os: macos-15-intel
            node: "22"
          # Node 24 version coverage on Linux
          - os: ubuntu-latest
            node: "24"
          - os: ubuntu-24.04-arm
            node: "24"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Snapshot running processes
        if: runner.os == 'Linux'
        id: snap-install
        run: |
          PIDFILE=$(mktemp)
          ps -u $USER -o pid= | sort > "$PIDFILE"
          echo "pidfile=$PIDFILE" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Build
        run: npm run build

      - name: Kill processes spawned during install
        if: runner.os == 'Linux'
        env:
          PRE_INSTALL_PIDS: ${{ steps.snap-install.outputs.pidfile }}
        run: |
          KILL_PIDS=$(mktemp)
          comm -13 "$PRE_INSTALL_PIDS" <(ps -u $USER -o pid= | sort) \
            | grep -vw $$ \
            > "$KILL_PIDS" || true
          if [ -s "$KILL_PIDS" ]; then
            xargs sudo kill -9 < "$KILL_PIDS" 2>/dev/null || true
            # Verify no targeted processes survived
            SURVIVED=$(comm -12 <(sort "$KILL_PIDS") <(ps -u $USER -o pid= | sort) | wc -l)
            if [ "$SURVIVED" -gt 0 ]; then
              echo "ERROR: some processes survived kill" >&2
              exit 1
            fi
          fi

      - name: Lock down network egress
        if: runner.os == 'Linux'
        run: |
          # Resolve whitelisted API domains while DNS is still open
          HOSTS="api.anthropic.com generativelanguage.googleapis.com api.openai.com"
          RESOLVED=""
          for host in $HOSTS; do
            for ip in $(dig +short "$host" | grep -E '^[0-9]'); do
              RESOLVED="$RESOLVED $host:$ip"
            done
          done
          # Block all outbound traffic by default
          sudo iptables -F OUTPUT
          sudo iptables -P OUTPUT DROP
          # Allow loopback and existing connections
          sudo iptables -A OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
          # Whitelist resolved API IPs and pin them in /etc/hosts
          for entry in $RESOLVED; do
            host="${entry%%:*}"
            ip="${entry##*:}"
            echo "$ip $host" | sudo tee -a /etc/hosts
            sudo iptables -A OUTPUT -d "$ip" -p tcp --dport 443 -j ACCEPT
          done

      - name: Snapshot processes before tests
        if: runner.os == 'Linux'
        id: snap-test
        run: |
          PIDFILE=$(mktemp)
          ps -u $USER -o pid= | sort > "$PIDFILE"
          echo "pidfile=$PIDFILE" >> "$GITHUB_OUTPUT"

      - name: Run tests (Linux, with API keys)
        if: runner.os == 'Linux'
        run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run tests (macOS, no API keys)
        if: runner.os == 'macOS'
        run: npm test

      - name: Kill processes spawned during tests
        if: runner.os == 'Linux' && always()
        env:
          PRE_TEST_PIDS: ${{ steps.snap-test.outputs.pidfile }}
        run: |
          KILL_PIDS=$(mktemp)
          comm -13 "$PRE_TEST_PIDS" <(ps -u $USER -o pid= | sort) \
            | grep -vw $$ \
            > "$KILL_PIDS" || true
          if [ -s "$KILL_PIDS" ]; then
            xargs sudo kill -9 < "$KILL_PIDS" 2>/dev/null || true
            # Verify no targeted processes survived
            SURVIVED=$(comm -12 <(sort "$KILL_PIDS") <(ps -u $USER -o pid= | sort) | wc -l)
            if [ "$SURVIVED" -gt 0 ]; then
              echo "ERROR: some processes survived kill" >&2
              exit 1
            fi
          fi

      - name: Restore network access
        if: runner.os == 'Linux' && always()
        run: |
          sudo iptables -F OUTPUT
          sudo iptables -P OUTPUT ACCEPT

  # Verify that no tracked src/*.ts file exceeds its line-count ceiling.
  # Source files: max 800 lines. Test files: max 1500 lines.
  # Grandfathered files must not grow beyond their individual ceiling.
  check-file-size:
    name: File size check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check file sizes
        run: node scripts/check-file-size.mjs --all

  # Verify that every exported function in *-validation.ts files is named
  # validate* so the naming convention cannot drift silently.
  check-validate-prefix:
    name: validate* prefix check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check validate* prefix
        run: node scripts/check-validate-prefix.mjs --all

  # Verify that %Lines coverage has not regressed for any tracked file
  # and that any brand-new file debuts at 100%.
  check-coverage:
    name: Coverage floor check
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Build
        run: npm run build

      - name: Check coverage floor
        run: node scripts/check-coverage.mjs

  # Re-execute every code block in each Showboat demo document under
  # demo/showboat-notes/ and confirm the captured output still matches.
  # The documents call node ./dist/execute-cli.mjs, so a full build is required.
  verify-showboat-docs:
    name: Verify Showboat docs
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Build
        run: npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Verify Showboat documents
        env:
          NODE_OPTIONS: --no-deprecation
        run: |
          for doc in demo/showboat-notes/*.md; do
            echo "=== verifying $doc ==="
            uvx showboat verify "$doc"
          done

  # Minimal test for dependabot PRs (just verify deps work)
  test-dependabot:
    name: Test (Dependabot)
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
