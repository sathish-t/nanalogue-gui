# Validates that demo data generation and Playwright screenshots run successfully.
# Does not commit generated files — avoids churn from randomised output.

name: Demo screenshots

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: demo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    name: Generate demo data & screenshots
    runs-on: ubuntu-latest
    environment: demo
    # Permissions needed for checkout and artifact upload.
    permissions:
      # permissions: contents read, needed for checkout.
      contents: read
      actions: write # Needed for actions/upload-artifact.
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Snapshot running processes
        id: snap-install
        run: |
          PIDFILE=$(mktemp)
          ps -u $USER -o pid= | sort > "$PIDFILE"
          echo "pidfile=$PIDFILE" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Install display dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb openbox

      - name: Install Playwright Electron deps
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Generate demo data
        run: node demo/generate-demo-bam.mjs

      - name: Kill processes spawned during install
        env:
          PRE_INSTALL_PIDS: ${{ steps.snap-install.outputs.pidfile }}
        run: |
          KILL_PIDS=$(mktemp)
          comm -13 "$PRE_INSTALL_PIDS" <(ps -u $USER -o pid= | sort) \
            | grep -vw $$ \
            > "$KILL_PIDS" || true
          if [ -s "$KILL_PIDS" ]; then
            xargs sudo kill -9 < "$KILL_PIDS" 2>/dev/null || true
            # Verify no targeted processes survived
            SURVIVED=$(comm -12 <(sort "$KILL_PIDS") <(ps -u $USER -o pid= | sort) | wc -l)
            if [ "$SURVIVED" -gt 0 ]; then
              echo "ERROR: some processes survived kill" >&2
              exit 1
            fi
          fi

      - name: Lock down network egress
        run: |
          # Resolve whitelisted API domains while DNS is still open
          HOSTS="api.anthropic.com generativelanguage.googleapis.com api.openai.com"
          RESOLVED=""
          for host in $HOSTS; do
            for ip in $(dig +short "$host" | grep -E '^[0-9]'); do
              RESOLVED="$RESOLVED $host:$ip"
            done
          done
          # Block all outbound traffic by default
          sudo iptables -F OUTPUT
          sudo iptables -P OUTPUT DROP
          # Allow loopback and existing connections
          sudo iptables -A OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
          # Whitelist resolved API IPs and pin them in /etc/hosts
          for entry in $RESOLVED; do
            host="${entry%%:*}"
            ip="${entry##*:}"
            echo "$ip $host" | sudo tee -a /etc/hosts
            sudo iptables -A OUTPUT -d "$ip" -p tcp --dport 443 -j ACCEPT
          done

      - name: Snapshot processes before screenshots
        id: snap-test
        run: |
          PIDFILE=$(mktemp)
          ps -u $USER -o pid= | sort > "$PIDFILE"
          echo "pidfile=$PIDFILE" >> "$GITHUB_OUTPUT"

      - name: Take screenshots
        run: >-
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24"
          sh -c "openbox & sleep 1 && npx playwright test --config demo/playwright.config.mjs"
        env:
          ELECTRON_EXTRA_LAUNCH_ARGS: "--no-sandbox --disable-gpu"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Kill processes spawned during screenshots
        if: always()
        env:
          PRE_TEST_PIDS: ${{ steps.snap-test.outputs.pidfile }}
        run: |
          KILL_PIDS=$(mktemp)
          comm -13 "$PRE_TEST_PIDS" <(ps -u $USER -o pid= | sort) \
            | grep -vw $$ \
            > "$KILL_PIDS" || true
          if [ -s "$KILL_PIDS" ]; then
            xargs sudo kill -9 < "$KILL_PIDS" 2>/dev/null || true
            # Verify no targeted processes survived
            SURVIVED=$(comm -12 <(sort "$KILL_PIDS") <(ps -u $USER -o pid= | sort) | wc -l)
            if [ "$SURVIVED" -gt 0 ]; then
              echo "ERROR: some processes survived kill" >&2
              exit 1
            fi
          fi

      - name: Restore network access
        if: always()
        run: |
          sudo iptables -F OUTPUT
          sudo iptables -P OUTPUT ACCEPT

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: demo-screenshots
          path: demo/*.png
