# Validates that demo data generation and Playwright screenshots run successfully.
# Does not commit generated files — avoids churn from randomised output.

name: Demo screenshots

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: write

jobs:
  demo:
    name: Generate demo data & screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install display dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb openbox

      - name: Install Playwright Electron deps
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Generate demo data
        run: node demo/generate-demo-bam.mjs

      - name: Take screenshots
        run: >-
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24"
          sh -c "openbox & sleep 1 && npx playwright test --config demo/playwright.config.mjs"
        env:
          ELECTRON_EXTRA_LAUNCH_ARGS: "--no-sandbox --disable-gpu"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: demo-screenshots
          path: demo/*.png
