# Smoke test workflow for nanalogue-gui.
# Launches the Electron app via Playwright and runs structural checks across
# landing, swipe, and QC modes.  Covers both renderer and main process changes
# since a fresh Electron instance is launched for each suite.

name: Smoke tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    # Permissions needed for checkout and artifact upload.
    permissions:
      # permissions: contents read, needed for checkout.
      contents: read
      actions: write # Needed for actions/upload-artifact.
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild electron esbuild electron-winstaller

      - name: Install display dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb openbox

      - name: Install Playwright Electron deps
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: >-
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24"
          ./scripts/smoke/smoke-all.sh
        env:
          ELECTRON_EXTRA_LAUNCH_ARGS: "--no-sandbox --disable-gpu"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: smoke-screenshots
          path: /tmp/smoke-*/
