# Runs the rodney tests against a live Electron instance.
# Starts Electron in debug mode on port 9222, waits for it to be ready,
# then drives it with rodney via uvx.
#
# All .sh files in demo/rodney-demo/ are discovered and run automatically —
# no changes to this file are needed when new test scripts are added.

name: Rodney demo

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rodney:
    name: Rodney demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install display dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: npm run build

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Start Electron in debug mode
        run: |
          node_modules/.bin/electron \
            --no-sandbox --disable-gpu \
            --remote-debugging-port=9222 \
            dist/main.js &
          echo "ELECTRON_PID=$!" >> $GITHUB_ENV

      - name: Wait for Electron to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9222/json/version > /dev/null 2>&1; then
              echo "Electron ready"
              exit 0
            fi
            sleep 1
          done
          echo "Electron did not become ready in time"
          exit 1

      - name: Run rodney tests
        run: |
          for script in demo/rodney-demo/*.sh; do
            echo "=== running $script ==="
            bash "$script"
          done

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rodney-screenshots
          path: /tmp/rodney-*/
